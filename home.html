<!DOCTYPE html>
<html lang="en" class="h-100" data-theme="light">
<head>
<script>
    // 1. PREVENT FLASHING
    const savedColor = localStorage.getItem("themeColor") || "#6366f1";
    const savedMode = localStorage.getItem("displayMode") || "light";
    document.documentElement.setAttribute('data-theme', savedMode);
    
    if (savedColor) {
        document.documentElement.style.setProperty('--primary', savedColor);
        document.documentElement.style.setProperty('--hive-primary', savedColor);
        
        const s = document.createElement('style');
        s.innerHTML = `
            :root { 
                --primary: ${savedColor} !important;
                --hive-primary: ${savedColor} !important;
                --primary-gradient: linear-gradient(135deg, ${savedColor} 0%, #a855f7 100%) !important;
            } 
            
            .hero-blob { 
                box-shadow: 0 20px 40px ${savedColor}44 !important; 
                background: var(--primary-gradient) !important;
            }

            .nav-link.active { border-bottom: 2px solid ${savedColor} !important; }
            .profile-icon { color: ${savedColor} !important; }
            .footer-link:hover { color: ${savedColor} !important; }
        `;
        document.head.appendChild(s);
    }
</script>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>HabitHive | Home</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.8.1/font/bootstrap-icons.css" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link href="css/styles.css" rel="stylesheet" />
    
    <style>
    /* 1. CORE THEME & LAYOUT */
    :root, [data-theme="light"] {
        --background: #f8fafc;
        --card-bg: #ffffff;
        --text-main: #1e293b;
        --border: #e2e8f0;
        --muted: #64748b;
    }
    [data-theme="dark"] {
        --background: #0f172a;
        --card-bg: #1e293b;
        --text-main: #f1f5f9;
        --border: #334155;
        --muted: #94a3b8;
    }

    body {
        background-color: var(--background) !important;
        color: var(--text-main);
        font-family: 'Plus Jakarta Sans', sans-serif;
        transition: 0.3s ease;
    }

    /* 2. NAVBAR & ADAPTIVE UNDERLINE */
    .navbar { 
        background-color: var(--card-bg) !important; 
        border-bottom: 1px solid var(--border) !important;
    }

    .nav-link { 
        color: var(--text-main) !important; 
        position: relative;
        display: inline-block !important;
        padding-bottom: 5px !important;
        margin: 0 10px;
        opacity: 0.7;
        transition: 0.3s;
    }

    .nav-link.active, .nav-link:hover { opacity: 1; }

    .nav-link.active::after {
        content: "";
        position: absolute;
        bottom: 0;
        left: 0;
        width: 100%;
        height: 3px;
        background-color: var(--primary);
        border-radius: 10px;
    }

    /* 3. HERO SECTION */
    .text-gradient {
        background: linear-gradient(45deg, var(--primary), #6610f2);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
    }

    .hero-blob {
        transition: transform 0.5s ease;
    }
    .hero-blob:hover { transform: scale(1.05) rotate(5deg); }

    /* 4. BUTTONS */
    .btn-primary {
        background-color: var(--primary) !important;
        border: none !important;
        transition: 0.3s ease !important;
    }
    .btn-primary:hover { transform: translateY(-3px); box-shadow: 0 10px 20px rgba(0,0,0,0.1); }

    .btn-outline-dark {
        border: 2px solid var(--border) !important;
        color: var(--text-main) !important;
        transition: 0.3s ease !important;
    }
    .btn-outline-dark:hover { background: var(--text-main) !important; color: var(--card-bg) !important; transform: translateY(-3px); }

    /* 5. PROFILE DROPDOWN */
    .profile-menu { position: relative; cursor: pointer; }
    .profile-dropdown {
        display: none;
        position: absolute;
        right: 0;
        top: 100%;
        background: var(--card-bg);
        border: 1px solid var(--border);
        border-radius: 12px;
        box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        z-index: 1000;
        min-width: 200px;
        padding: 15px;
    }
    .profile-menu:hover .profile-dropdown { display: block; }
    
    .dropdown-item {
        color: var(--text-main);
        border-radius: 8px;
        padding: 8px 12px;
    }
    .dropdown-item:hover { background: var(--background); color: var(--primary); }

    /* 6. RESPONSIVENESS */
    @media (max-width: 991px) {
        .navbar-collapse {
            background: var(--card-bg);
            padding: 20px;
            border-radius: 15px;
            margin-top: 15px;
            border: 1px solid var(--border);
        }
        .nav-link { display: block !important; margin: 10px 0; }
        .hero-blob { width: 180px !important; height: 180px !important; margin-top: 30px; }

        /* Settings Hover - Matches Theme Color */
.settings-link:hover {
    background-color: var(--primary) !important;
    color: white !important;
}

/* Logout Hover - Always Red */
.logout-link:hover {
    background-color: #ef4444 !important; /* High-visibility red */
    color: white !important;
    border-color: #ef4444 !important;
}

/* Smooth transition for the hover effect */
.dropdown-item {
    transition: all 0.2s ease;
}
    }
</style>
</head>

    <script>
        // Init
        const firebaseConfig = { 
            apiKey: "AIzaSyA0uV1yU0QnEQbs2hV1UrCYdZZXYnhaxKs",
            authDomain: "habit-hive-c3a98.firebaseapp.com",
            projectId: "habit-hive-c3a98",
            storageBucket: "habit-hive-c3a98.firebasestorage.app",
            messagingSenderId: "872810952968",
            appId: "1:872810952968:web:9075bc84022ad7310f94bd"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        
        const currentUser = localStorage.getItem("username") || "Guest";
        document.getElementById('userDisp').innerText = currentUser;

        function applyThemeLocally(color, mode) {
            document.documentElement.setAttribute('data-theme', mode);
            document.documentElement.style.setProperty('--primary', color);
            document.querySelectorAll('.text-gradient').forEach(el => {
                el.style.backgroundImage = `linear-gradient(45deg, ${color}, #6610f2)`;
            });
        }

        db.collection("userSettings").doc(currentUser).get().then(doc => {
            if (doc.exists) {
                const data = doc.data();
                const color = data.themeColor || localStorage.getItem("themeColor") || "#6366f1";
                const mode = data.displayMode || localStorage.getItem("displayMode") || "light";
                applyThemeLocally(color, mode);
            }
        });

        function logout() {
            localStorage.clear();
            window.location.href = "index.html";
        }
    </script>
</body>
</html>
