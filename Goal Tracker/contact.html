        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />

        <link rel="icon" type="image/x-icon" href="assets/favicon.ico" />

        <link href="css/styles.css" rel="stylesheet" />
    </head>
    <body class="d-flex flex-column h-100">
        <main class="flex-shrink-0">
            <nav class="navbar navbar-expand-lg py-3">
                <div class="container px-5">
                    <a class="navbar-brand" href="index.html"><span class="fw-bolder">HabitHive</span></a>
                    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarSupportedContent">
                        <span class="navbar-toggler-icon">&#9776;</span>
                    </button>
                    <div class="collapse navbar-collapse" id="navbarSupportedContent">
                        <ul class="navbar-nav ms-auto mb-2 mb-lg-0 small fw-bolder">
                            <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
                            <li class="nav-item"><a class="nav-link" href="todo.html">Daily</a></li>
                            <li class="nav-item"><a class="nav-link" href="checklist.html">Monthly</a></li>
                            <li class="nav-item"><a class="nav-link" href="progress.html">Progress</a></li>
                            <li class="nav-item">
                                <div class="profile-menu">
                                    <div class="profile-icon"><i class="bi bi-person-circle"></i></div>
                                    <div class="profile-dropdown">
                                        <div class="user-info">
                                            <small>Signed in as</small>
                                            <strong id="usernameDisplay">Guest</strong>
                                        </div>
                                        <hr>
                                        <p onclick="window.location.href='setting.html'"><i class="bi bi-gear"></i> Settings</p>
                                        <p onclick="localStorage.removeItem('username'); window.location.href='login.html'"><i class="bi bi-box-arrow-right"></i> Logout</p>

            <section class="py-5">
                <div class="container px-5">
                    <div class="bg-light rounded-4 py-5 px-4 px-md-5">
                        <div class="text-center mb-5">
                            <div class="feature bg-primary bg-gradient-primary-to-secondary text-white rounded-3 mb-3"><i class="bi bi-envelope"></i></div>
                            <h1 class="fw-bolder">Get in touch</h1>
                            <p class="lead fw-normal text-muted mb-0">Let's work together!</p>
                        </div>
                        <div class="row gx-5 justify-content-center">
                            <div class="col-lg-8 col-xl-6">
                                <form id="contactForm">
                                    <div class="form-floating mb-3">
                                        <input class="form-control" id="name" type="text" placeholder="Full Name" required />
                                        <label for="name">Full name</label>
                                    </div>
                                    <div class="form-floating mb-3">
                                        <input class="form-control" id="email" type="email" placeholder="name@example.com" required />
                                        <label for="email">Email address</label>
                                    </div>
                                    <div class="form-floating mb-3">
                                        <input class="form-control" id="phone" type="tel" placeholder="(123) 456-7890" required />
                                        <label for="phone">Phone number</label>
                                    </div>
                                    <div class="form-floating mb-3">
                                        <textarea class="form-control" id="message" placeholder="Message" style="height: 10rem" required></textarea>
                                        <label for="message">Message</label>
                                    </div>

                                    <div id="statusMessage" class="mb-3"></div>

                                    <div class="d-grid"><button class="btn btn-primary btn-lg" id="submitButton" type="submit">Submit</button></div>
                                </form>
                            </div>
                        </div>
                    </div>
                </div>
            </section>
        </main>

        <footer class="bg-white py-4 mt-auto">
            <div class="container px-5 text-center">
                <div class="small m-0 text-muted">Copyright &copy; HabitHive 2026</div>
            </div>
        </footer>

        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"></script>
        
        <script>
            // Sync Username
            document.getElementById('usernameDisplay').textContent = localStorage.getItem("username") || "Guest";

            const contactForm = document.getElementById('contactForm');
            
            contactForm.addEventListener('submit', async function(event) {
                event.preventDefault();
                
                const submitBtn = document.getElementById('submitButton');
                const statusDiv = document.getElementById('statusMessage');

                submitBtn.disabled = true;
                submitBtn.innerText = "Sending...";
                statusDiv.innerHTML = "";

                const formData = {
                    from_name: document.getElementById('name').value,
                    from_email: document.getElementById('email').value,
                    phone_number: document.getElementById('phone').value,
                    message: document.getElementById('message').value,
                    time: new Date().toLocaleString()
                };

                try {
                    // Send via EmailJS with your verified IDs
                    await emailjs.send("service_5szb5ql", "template_d6d25es", formData);
                    
                    // Backup to Firebase
                    db.collection("contactMessages").add({
                        ...formData,
                        timestamp: firebase.firestore.FieldValue.serverTimestamp()
                    }).catch(e => console.log("Firebase sync skipped"));

                    statusDiv.innerHTML = '<div class="alert alert-success border-0 shadow-sm">Message sent! Check your inbox.</div>';
                    contactForm.reset();
                } catch (error) {
                    console.error("Error:", error);
                    statusDiv.innerHTML = `<div class="alert alert-danger border-0 shadow-sm">Error: ${error.text || "Submission failed"}</div>`;
                } finally {
                    submitBtn.disabled = false;
                    submitBtn.innerText = "Submit";
                }
            });
        </script>
    </body>
</html>
