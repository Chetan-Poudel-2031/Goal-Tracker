      const db = firebase.firestore();

    <title>Daily Todo List</title>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link href="https://fonts.googleapis.com/css2?family=Caveat+Brush&family=Lato:wght@400;700&display=swap" rel="stylesheet">
    <link href="styles.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Caveat+Brush&family=Lato:wght@400;700&family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.8.1/font/bootstrap-icons.css" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <style>
        :root {
            --primary: #4a90e2;
            --bg: #f4f7f6;
            --text: #333;
            --card-bg: #white;
            --accent: #264456;
            --text-dim: #999;
        }

        body {
          margin: 0;
          min-height: 100vh;
          background-color: var(--bg);
          font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
          color: var(--text);
        }

        .navbar {
            width: 100%;
            margin-bottom: 40px;
        }

        .containertodo {
            max-width: 600px;
            width: 90%; 
            margin: 0 auto 40px auto; 
            background: white;
            padding: 30px;
            border-radius: 12px;
            border: 1px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5); 
            position: relative;
        }

        .header-top {
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 5px;
            min-height: 40px;
        }

        .back {
            position: absolute;
            left: 0;
            display: flex;
            align-items: center;
        }

        .back a {
            display: flex;
            text-decoration: none;
            transition: transform 0.2s ease;
        }

        .back a:hover {
            transform: scale(1.1);
        }

        .back img {
            height: 1.5em;
            width: 1.5em;
            display: block;
        }

        h2 { 
            margin: 0; 
            color: var(--primary);
            font-size: 1.8rem;
            text-align: center;
            font-weight: bold;
        }

        h4 {
            text-align: center; 
            color: #666;
            font-weight: 400;
            margin-top: 5px;
            margin-bottom: 25px;
            line-height: 1.4;
            font-size: 1rem;
        }

        .todo-list {
            border: 1px solid #eee;
            border-radius: 10px;
            padding: 10px 25px;
            margin-bottom: 20px;
        }

        .todo-list__title {
            padding: 3px 12px;
            background-color: var(--primary);
            color: white;
            border-radius: 5px;
            font-family: 'Caveat Brush', cursive;
            font-size: 1.1rem;
        }

        .todo-list__label {
            display: flex;
            align-items: center;
            margin: 20px 0;
            font-size: 18px;
            cursor: pointer;
            font-family: 'Lato', sans-serif;
            position: relative;
        }

        .todo-list__label input {
            position: absolute;
            opacity: 0;
        }

        .check {
            width: 22px;
            height: 22px;
            border: 2px solid #ddd;
            margin-right: 15px;
            display: inline-block;
            transition: 0.2s;
            flex-shrink: 0;
            background: #fff;
        }

        input:checked + .check {
            width: 22px;
            height: 12px;
            border-top: transparent;
            border-right: transparent;
            border-color: var(--primary);
            transform: rotate(-45deg);
            margin-bottom: 8px;
        }

        .todo-text {
            position: relative;
            transition: 0.3s;
            color: var(--text);
        }

        .todo-text::before {
            content: "";
            position: absolute;
            top: 50%;
            left: 0;
            width: 100%;
            height: 1px;
            background: #ccc;
            transform: scaleX(0);
            transform-origin: right;
            transition: transform 0.4s;
        }

        input:checked ~ .todo-text {
            color: var(--text-dim);
        }

        input:checked ~ .todo-text::before {
            transform: scaleX(1);
            transform-origin: left;
        }

        .input-group {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }

        input[type="text"] {
            flex-grow: 1;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            outline: none;
        }

        button#add-btn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
        }

        .hint {
            font-size: 11px;
            color: #bbb;
            text-align: center;
            margin-top: 10px;
        }
    </style>
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-light bg-white py-3 shadow-sm">
    <div class="container px-5">
        <a class="navbar-brand" href="index.html">
            <span class="fw-bolder text-gradient">Habit-Hive</span>
        </a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarSupportedContent">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarSupportedContent">
            <ul class="navbar-nav ms-auto mb-2 mb-lg-0 small fw-bolder">
                <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
                <li class="nav-item"><a class="nav-link" href="todo.html">Daily</a></li>
                <li class="nav-item"><a class="nav-link" href="checklist.html">Monthly</a></li>
                <li class="nav-item"><a class="nav-link" href="progress.html">Progress</a></li>
                <li class="nav-item"><a class="nav-link text-primary" href="setting.html"><i class="bi bi-gear-fill"></i> Settings</a></li>
            </ul>
        </div>
    </div>
</nav>
<div class="containertodo">
    <div class="header-top">
        <div class="back">
            <a href="index.html">
                <img src="assets/arrow.png" alt="Back">
            </a>
        </div>
        <h2>Daily Todo List</h2>
    </div>

    <h4>Start your day with some tasks and stay organized!</h4>

    <fieldset class="todo-list">
        <legend class="todo-list__title">Tasks</legend>
        <div id="todoContainer"></div>
    </fieldset>

    <div class="input-group">
        <input type="text" id="newTodoInput" placeholder="Enter a new task...">
        <button id="add-btn" onclick="submitNewTodo()">Add</button>
    </div>
    
    <div class="hint">Double-click a task to delete it</div>
</div>

<script>
    const todoContainer = document.getElementById("todoContainer");
    const newTodoInput = document.getElementById("newTodoInput");
    
    // Get the current logged-in user
    const currentUser = localStorage.getItem("username") || "guest";

    // Real-time listener
    db.collection("dailyTasks")
      .where("owner", "==", currentUser)
      .orderBy("createdAt", "asc")
      .onSnapshot((snapshot) => {
        todoContainer.innerHTML = "";
        snapshot.forEach((doc) => {
            const task = doc.data();
            const id = doc.id;
            
            // Check if createdAt exists to avoid flickering during initial sync
            const label = document.createElement("label");
            label.className = "todo-list__label";
            label.ondblclick = () => deleteTask(id);
            label.innerHTML = `
                <input type="checkbox" ${task.done ? 'checked' : ''} onchange="toggleTask('${id}', ${task.done})">
                <i class="check"></i>
                <span class="todo-text">${task.text || ''}</span>
            `;
            todoContainer.appendChild(label);
        });
    }, (error) => {
        console.error("Firestore Error:", error);
        if (error.message.includes("index")) {
            alert("Firestore Index required. Check your browser console for the setup link.");
        }
    });

    window.submitNewTodo = function() {
        const val = newTodoInput.value.trim();
        if(val) {
            db.collection("dailyTasks").add({
                text: val,
                done: false,
                owner: currentUser,
                createdAt: firebase.firestore.FieldValue.serverTimestamp()
            }).catch(err => console.error("Add error:", err));
            newTodoInput.value = "";
        }
    };

    window.toggleTask = function(id, currentStatus) {
        db.collection("dailyTasks").doc(id).update({
            done: !currentStatus
        });
    };

    window.deleteTask = function(id) {
        db.collection("dailyTasks").doc(id).delete();
    };

    newTodoInput.addEventListener("keydown", (e) => { 
        if(e.key === "Enter") submitNewTodo(); 
    });
</script>
</body>
</html>
