<!DOCTYPE html>
<html lang="en">
<head>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>

    <script>
      const firebaseConfig = {
        apiKey: "AIzaSyA0uV1yU0QnEQbs2hV1UrCYdZZXYnhaxKs",
        authDomain: "habit-hive-c3a98.firebaseapp.com",
        projectId: "habit-hive-c3a98",
        storageBucket: "habit-hive-c3a98.firebasestorage.app",
        messagingSenderId: "872810952968",
        appId: "1:872810952968:web:9075bc84022ad7310f94bd",
        measurementId: "G-LE86ZLX8N0"
      };

      // Initialize Firebase
      firebase.initializeApp(firebaseConfig);
      
      // This is the "db" variable we will use to save/load tasks
      const db = firebase.firestore();
    </script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>30-Day Task Tracker</title>
    <link href="styles.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Caveat+Brush&family=Lato:wght@400;700&family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.8.1/font/bootstrap-icons.css" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <style>
        :root {
    --primary: #4a90e2;
    --danger: #ff4d4d;
    --bg: #f4f7f6;
    --text: #333;
    --table-header: #f8f9fa;
    --total-bg: #eefbff;
        }

        body {
          margin: 0;
          min-height: 100vh;
          background-color: var(--bg);
          font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
          color: var(--text);
          /* Removed Flexbox from body to allow Nav to behave normally */
        }

        /* Standard Bootstrap Nav fix */
        .navbar {
            width: 100%;
            margin-bottom: 40px; /* Space between nav and todo list */
        }

        .containerchecklist {
            max-width: 1200px;
            margin: auto;
            background: white;
            padding: 30px;
            border-radius: 12px;
            border: 1px;
            box-shadow: 0 4px 25px rgba(0,0,0,0.5);
        }

        /* --- HEADER SECTION --- */
        .header-top {
            position: relative; /* Essential for the absolute back arrow */
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 5px;
            min-height: 40px;
        }

        .back {
            position: absolute;
            left: 0;
            display: flex;
            align-items: center;
        }

        .back a {
            display: flex;
            text-decoration: none;
            transition: transform 0.2s ease;
        }

        .back a:hover {
            transform: scale(1.1);
        }

        .back img {
            height: 1.5em;
            width: 1.5em;
            display: block;
        }

        h2 { 
            margin: 0; 
            color: var(--primary);
            font-size: 1.8rem;
            text-align: center;
            font-weight: bold;
        }

        h4 {
            text-align: center; 
            color: #666;
            font-weight: 400;
            margin-top: 5px;
            margin-bottom: 25px;
            font-size: 1rem;
        }

        /* --- INPUT SECTION --- */
        .input-group {
            display: flex;
            gap: 10px;
            margin-bottom: 25px;
        }

        input[type="text"] {
            flex-grow: 1;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            outline: none;
            transition: border-color 0.3s;
        }

        input[type="text"]:focus {
            border-color: var(--primary);
        }

        button#add-btn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 10px 25px;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        button#add-btn:hover {
            opacity: 0.9;
        }

        /* --- TABLE SECTION --- */
        .table-wrapper {
            overflow-x: auto;
            border-radius: 8px;
            border: 1px solid #eee;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 14px;
            background: white;
        }

        th, td {
            border: 1px solid #eee;
            padding: 10px 5px;
            text-align: center;
        }

        th { 
            background: var(--table-header); 
            position: sticky; 
            top: 0; 
            font-weight: 600;
            color: #555;
        }

        .task-name { 
            text-align: left; 
            min-width: 180px; 
            padding-left: 15px;
            font-weight: bold; 
            color: var(--text);
        }

        .day-col { 
            min-width: 35px; 
        }

        .total-col { 
            font-weight: bold; 
            background: var(--total-bg); 
            width: 60px; 
            color: var(--primary);
        }

        /* --- INTERACTIVE ELEMENTS --- */
        .delete-btn {
            background: var(--danger);
            color: white;
            border: none;
            padding: 6px 12px;
            border-radius: 5px;
            font-size: 12px;
            cursor: pointer;
            transition: background 0.2s;
        }

        .delete-btn:hover {
            background: #e03a3a;
        }

        input[type="checkbox"] { 
            cursor: pointer; 
            width: 18px;
            height: 18px;
            accent-color: var(--primary);
        }

        /* Custom Scrollbar for the table */
        .table-wrapper::-webkit-scrollbar {
            height: 8px;
        }
        .table-wrapper::-webkit-scrollbar-thumb {
            background: #ccc;
            border-radius: 10px;
        }

    </style>
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-light bg-white py-3 shadow-sm">
    <div class="container px-5">
        <a class="navbar-brand" href="index.html">
            <span class="fw-bolder text-gradient">Habit-Hive</span>
        </a>

        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="navbarSupportedContent">
            <ul class="navbar-nav ms-auto mb-2 mb-lg-0 small fw-bolder">
                <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
                <li class="nav-item"><a class="nav-link" href="todo.html">Daily</a></li>
                <li class="nav-item"><a class="nav-link" href="checklist.html">Monthly</a></li>
                <li class="nav-item"><a class="nav-link" href="progress.html">Progress</a></li>
                <li class="nav-item">
                    <a class="nav-link text-primary" href="setting.html">
                        <i class="bi bi-gear-fill"></i> Settings
                    </a>
                </li>
            </ul>
        </div>
    </div>
</nav>
<div class="containerchecklist">
    <div class="header-top">
        <div class="back">
            <a href="index.html">
                <img style="height: 1.2em; width: 1.2em;" src="assets/arrow.png" alt="Back">
            </a>
        </div>
        
        <h2>Monthly Habit Tracker</h2>
    </div>

    <h4>View your monthly progress and set limits!</h4>
    
    <div class="input-group">
        <input type="text" id="taskInput" placeholder="Enter a new task...">
        <button id="add-btn">Add Task</button>
    </div>

    <div class="table-wrapper">
        <table id="taskTable">
            <thead>
                <tr id="headerRow">
                    <th class="task-name">Task</th>
                    <th class="total-col">Total</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody id="taskBody">
                </tbody>
        </table>
    </div>
</div>

<script>
    const taskInput = document.getElementById('taskInput');
    const addBtn = document.getElementById('add-btn');
    const taskBody = document.getElementById('taskBody');
    const headerRow = document.getElementById('headerRow');
    
    const currentUser = localStorage.getItem("username") || "guest";

    // Generate header days
    for (let i = 1; i <= 30; i++) {
        const th = document.createElement('th');
        th.innerText = i;
        th.className = 'day-col';
        headerRow.insertBefore(th, headerRow.children[headerRow.children.length - 2]);
    }

    // Real-time listener
    db.collection("monthlyTasks")
      .where("owner", "==", currentUser)
      .orderBy("createdAt", "asc")
      .onSnapshot((snapshot) => {
        taskBody.innerHTML = '';
        snapshot.forEach((doc) => {
            const task = doc.data();
            const id = doc.id;
            const row = document.createElement('tr');
            
            let completedCount = 0;
            let daysHtml = '';
            
            // Safety check for days array
            const taskDays = task.days || new Array(30).fill(false);

            for (let i = 0; i < 30; i++) {
                const checked = taskDays[i] ? 'checked' : '';
                if(taskDays[i]) completedCount++;
                daysHtml += `<td><input type="checkbox" ${checked} onchange="toggleDay('${id}', ${i}, ${taskDays[i]})"></td>`;
            }

            row.innerHTML = `
                <td class="task-name">${task.name}</td>
                ${daysHtml}
                <td class="total-col">${completedCount}</td>
                <td><button class="delete-btn" onclick="deleteTask('${id}')">Delete</button></td>
            `;
            taskBody.appendChild(row);
        });
    }, (error) => {
        console.error("Firestore Error:", error);
        if (error.message.includes("index")) {
            alert("Monthly Index required. Check console for the link.");
        }
    });

    addBtn.addEventListener('click', () => {
        const name = taskInput.value.trim();
        if (name) {
            db.collection("monthlyTasks").add({
                name: name,
                days: new Array(30).fill(false),
                done: false,
                owner: currentUser,
                createdAt: firebase.firestore.FieldValue.serverTimestamp()
            });
            taskInput.value = '';
        }
    });

    window.toggleDay = (taskId, dayIndex, currentVal) => {
        db.collection("monthlyTasks").doc(taskId).get().then(doc => {
            if (!doc.exists) return;
            const days = doc.data().days;
            days[dayIndex] = !currentVal;
            const isAnyDone = days.some(day => day === true);
            db.collection("monthlyTasks").doc(taskId).update({
                days: days,
                done: isAnyDone
            });
        });
    };

    window.deleteTask = (id) => {
        if(confirm('Are you sure?')) db.collection("monthlyTasks").doc(id).delete();
    };
    taskInput.addEventListener("keydown", (e) => { 
    if (e.key === "Enter") {
        const name = taskInput.value.trim();
        if (name) {
            db.collection("monthlyTasks").add({
                name: name,
                days: new Array(30).fill(false),
                done: false,
                owner: currentUser,
                createdAt: firebase.firestore.FieldValue.serverTimestamp()
            });
            taskInput.value = '';
        }
    }
});
</script>
</body>
</html>
