<!DOCTYPE html>
<html lang="en">
<head>
  <script>
  // If no username is found in localStorage, send them back to the login page
  if (!localStorage.getItem("username")) {
    window.location.href = "login.html"; 
  }
</script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyA0uV1yU0QnEQbs2hV1UrCYdZZXYnhaxKs",
      authDomain: "habit-hive-c3a98.firebaseapp.com",
      projectId: "habit-hive-c3a98",
      storageBucket: "habit-hive-c3a98.firebasestorage.app",
      messagingSenderId: "872810952968",
      appId: "1:872810952968:web:9075bc84022ad7310f94bd",
      measurementId: "G-LE86ZLX8N0"
    };

    // Initialize Firebase
    firebase.initializeApp(firebaseConfig);
    
    // This is the "db" variable we will use to save/load tasks
    const db = firebase.firestore();

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Habit-Hive Login</title>
  <style>
    :root {
      --primary: #4a90e2;
      --bg: #f4f7f6;
      --text: #333;
      --white: #ffffff;
      --shadow: rgba(0, 0, 0, 0.5);
    }

    body {
      margin: 0;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background-color: var(--bg);
      color: var(--text);
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      padding: 40px 20px;
    }

    /* Clean Header matching other pages */
    .header-top {
      width: 100%;
      max-width: 400px;
      text-align: center;
      margin-bottom: 20px;
    }

    #title {
      text-decoration: none;
      color: var(--primary);
      font-size: 2rem;
      font-weight: bold;
    }

    /* Container matching the Checklist theme */
    .logcontainer {
      width: 100%;
      max-width: 350px;
      padding: 30px;
      background: var(--white);
      border-radius: 12px;
      border: 1px;
      box-shadow: 0 4px 15px var(--shadow);
      text-align: center;
      box-sizing: border-box;
    }

    h2 {
      margin-top: 0;
      color: var(--text);
      font-size: 1.5rem;
      margin-bottom: 20px;
    }

    input {
      width: 100%;
      padding: 12px;
      margin: 10px 0;
      border: 1px solid #ddd;
      border-radius: 8px;
      box-sizing: border-box; /* Fixes width issue */
      outline: none;
      transition: border-color 0.3s;
    }

    input:focus {
      border-color: var(--primary);
    }

    input::placeholder {
      color: #bbb;
    }

    button {
      width: 100%;
      padding: 12px;
      background: var(--primary);
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 1rem;
      font-weight: bold;
      margin-top: 10px;
      transition: opacity 0.2s;
    }

    button:hover {
      opacity: 0.9;
    }

    #switchText {
      margin-top: 20px;
      font-size: 14px;
      color: #666;
    }

    #toggleForm {
      color: var(--primary);
      cursor: pointer;
      font-weight: bold;
      text-decoration: none;
    }

    #toggleForm:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>

  <div class="header-top">
    <a id="title">Habit-Hive</a>
  </div>

  <div class="logcontainer">
    <h2 id="formTitle">Sign Up</h2>

    <input type="text" id="username" placeholder="Username">
    <input type="password" id="password" placeholder="Password">

    <button id="mainBtn">Sign Up</button>

    <p id="switchText">
        Already have an account? 
        <span id="toggleForm">Login</span>
    </p>
  </div>

<script>
let isLogin = false;
const formTitle = document.getElementById("formTitle");
const mainBtn = document.getElementById("mainBtn");
const switchText = document.getElementById("switchText");

mainBtn.addEventListener("click", async () => {
  const userVal = document.getElementById("username").value.trim();
  const passVal = document.getElementById("password").value.trim();

  if (!userVal || !passVal) {
    alert("Please fill all fields");
    return;
  }

  if (isLogin) {
    // LOGIN LOGIC: Look for the user in Firebase
    const userDoc = await db.collection("users").doc(userVal).get();

    if (userDoc.exists && userDoc.data().password === passVal) {
      alert("Welcome back!");
      // Set username in local storage for navigation display
      localStorage.setItem("username", userVal);
      window.location.href = "index.html";
    } else {
      alert("Invalid credentials");
    }
  } else {
    // SIGN UP LOGIC: Check if user exists first
    const userDoc = await db.collection("users").doc(userVal).get();
    
    if (userDoc.exists) {
      alert("Username already exists!");
    } else {
      await db.collection("users").doc(userVal).set({
        username: userVal,
        password: passVal
      });
      alert("Account created!");
      localStorage.setItem("username", userVal);
      window.location.href = "index.html";
    }
  }
});

// Using event delegation to handle the dynamic span click
document.addEventListener("click", (e) => {
  if (e.target && e.target.id === "toggleForm") {
    toggleMode();
  }
});

function toggleMode() {
  isLogin = !isLogin;
  if (isLogin) {
    formTitle.textContent = "Login";
    mainBtn.textContent = "Login";
    switchText.innerHTML = `Don't have an account? <span id="toggleForm">Sign Up</span>`;
  } else {
    formTitle.textContent = "Sign Up";
    mainBtn.textContent = "Sign Up";
    switchText.innerHTML = `Already have an account? <span id="toggleForm">Login</span>`;
  }
}
</script>
</body>
</html>
