<!DOCTYPE html>
<html data-theme="light" lang="en">
<head>
    <script>
  // If no username is found in localStorage, send them back to the login page
  if (!localStorage.getItem("username")) {
    window.location.href = "login.html"; 
  }
</script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyA0uV1yU0QnEQbs2hV1UrCYdZZXYnhaxKs",
            authDomain: "habit-hive-c3a98.firebaseapp.com",
            projectId: "habit-hive-c3a98",
            storageBucket: "habit-hive-c3a98.firebasestorage.app",
            messagingSenderId: "872810952968",
            appId: "1:872810952968:web:9075bc84022ad7310f94bd",
            measurementId: "G-LE86ZLX8N0"
        };

        // 1. Initialize Firebase
        firebase.initializeApp(firebaseConfig);
        
        // 2. Define db FIRST
        const db = firebase.firestore();

        // 3. NOW use db to check theme (prevents white flash)
        db.collection("settings").doc("theme").get().then((doc) => {
            if (doc.exists && doc.data().mode) {
                document.documentElement.setAttribute("data-theme", doc.data().mode);
            }
        }).catch(err => console.log("Theme load error:", err));
    </script>

    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    <title>Settings - HabitHive</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700&display=swap" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.8.1/font/bootstrap-icons.css" rel="stylesheet" />
    <link href="css/styles.css" rel="stylesheet" />
    
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f8f9fa; transition: background-color 0.3s ease; }
        .settings-container { max-width: 500px; margin: 50px auto; padding: 20px;}
        .settings-box {
            background: #ffffff;
            border-radius: 16px;
            margin-bottom: 24px;
            padding: 28px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1); 
            border: 1px solid rgba(0, 0, 0, 0.05);
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        /* Dark Mode adjustments for the boxes if the CSS doesn't handle it */
        [data-theme="dark"] .settings-box {
            background: #2d2d2d;
            border-color: #444;
            color: white;
        }
        [data-theme="dark"] .settings-box h3 { color: #fff; }
        [data-theme="dark"] body { background-color: #1a1a1a; }

        .settings-box:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 30px rgba(0, 0, 0, 0.15);
        }
        .settings-box h3 { font-size: 1.2rem; font-weight: 700; margin-bottom: 15px; color: #333; }
        .color-picker { display: flex; gap: 10px; margin-top: 10px; }
        .color-btn { width: 35px; height: 35px; border-radius: 50%; border: 2px solid transparent; cursor: pointer; transition: 0.2s; }
        .color-btn:hover { transform: scale(1.1); }
        .btn-save { background: #4a90e2; border: none; color: white; }
        .btn-save:hover{ background-color: #0d6efd; color: white;}
        .btn-danger-soft { background: #fff5f5; color: #e74c3c; border: 1px solid #ffc1c1; }
        .btn-danger-soft:hover { background: #e74c3c; color: white; }
    </style>
</head>
<body>

    <nav class="navbar navbar-light bg-white py-3 shadow-sm">
        <div class="container px-5">
            <a class="navbar-brand fw-bolder text-gradient" href="index.html">HabitHive</a>
            <button onclick="window.location.href='index.html'" class="btn btn-sm btn-outline-dark">
                <i class="bi bi-house-door"></i> Back to Home
            </button>
        </div>
    </nav>

    <div class="settings-container">
        <h2 class="fw-bolder mb-4"><i class="bi bi-gear-fill me-2"></i>Settings</h2>

        <div class="settings-box">
            <h3><i class="bi bi-person me-2"></i>Profile</h3>
            <div class="input-group">
                <input type="text" id="newUsername" class="form-control" placeholder="Update your name">
                <button class="btn btn-save" id="saveUsername">Save</button>
            </div>
        </div>

        <div class="settings-box">
            <h3><i class="bi bi-palette me-2"></i>Appearance</h3>
            <p class="small text-muted mb-2">Choose your preferred theme color:</p>
            <div class="color-picker">
                <button class="color-btn" style="background-color: #0d6efd;" onclick="setTheme('#0d6efd')"></button>
                <button class="color-btn" style="background-color: #dc3545;" onclick="setTheme('#dc3545')"></button>
                <button class="color-btn" style="background-color: #198754;" onclick="setTheme('#198754')"></button>
                <button class="color-btn" style="background-color: #fd7e14;" onclick="setTheme('#fd7e14')"></button>
                <button class="color-btn" style="background-color: #d63384;" onclick="setTheme('#d63384')"></button>
            </div>
        </div>

        <div class="settings-box">
            <h3><i class="bi bi-shield-exclamation me-2"></i>Privacy & Data</h3>
            <p class="small text-muted">This will delete all your saved habits and progress permanently from the cloud.</p>
            <button class="btn btn-danger-soft w-100 fw-bold" id="clearData">
                <i class="bi bi-trash"></i> Clear All Data
            </button>
        </div>
    </div>

    <script src="js/scripts.js"></script>
</body>
</html>
