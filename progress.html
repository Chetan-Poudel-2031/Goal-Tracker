    const savedColor = localStorage.getItem("themeColor") || "#6366f1";

    document.documentElement.setAttribute('data-theme', savedMode);

                -webkit-background-clip: text !important; 
                -webkit-text-fill-color: transparent !important; 
            }
        `;
        document.head.appendChild(s);
    }
</script>

<style>
    :root {
        --bg: #f8fafc;
        --card-bg: #ffffff;
        --text: #1e293b;
        --border: #e2e8f0;
        --muted: #64748b;
        --progress-empty: rgba(0, 0, 0, 0.1); /* Light mode empty bar */
    }

    [data-theme="dark"] {
        --bg: #0f172a;
        --card-bg: #1e293b;
        --text: #f1f5f9;
        --border: #334155;
        --muted: #94a3b8;
        --progress-empty: rgba(255, 255, 255, 0.1); /* Dark mode empty bar */
    }

    body {
        background-color: var(--bg);
        color: var(--text);
        font-family: 'Plus Jakarta Sans', sans-serif;
        transition: 0.3s;
    }

    .navbar { border-bottom: 1px solid var(--border); background: var(--card-bg) !important; }
    
    .progress-card {
        background: var(--card-bg);
        border-radius: 24px;
        padding: 35px;
        border: 1px solid var(--border);

    /* Progress Bar Improvements */
    .progress {

        overflow: hidden;

    .history-title { font-weight: 800; color: var(--text); }

    .text-muted { color: var(--muted) !important; }
    
    .chart-wrapper { position: relative; height: 40vh; width: 100%; margin: 20px 0; }


    /* Navbar Toggler Icon Theme Sync */

    border-color: var(--border) !important;
}

/* In Light Mode (Default) */

}

/* In Dark Mode - Inverts the black icon to white */

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
    const currentUser = localStorage.getItem("username") || "guest";
    let themeColor = localStorage.getItem("themeColor") || "#6366f1";

    // --- 1. THEME SYNC ---
    db.collection("userSettings").doc(currentUser).get().then(doc => {
        if (doc.exists && doc.data().themeColor) {
            themeColor = doc.data().themeColor;
            document.documentElement.style.setProperty('--primary', themeColor);
            renderMonthlyChart();
        } else {
            renderMonthlyChart();
        }
    });

    // --- 2. THE MIDNIGHT RESET LOGIC ---
    async function checkDailyReset() {
        const today = new Date().toLocaleDateString();
        const lastReset = localStorage.getItem(`lastReset_${currentUser}`);

        // If today is a different day than the last time we opened the app
        if (lastReset && lastReset !== today) {
            const snapshot = await db.collection("dailyTasks").where("owner", "==", currentUser).get();
            
            if (!snapshot.empty) {
                let completed = 0;
                const total = snapshot.size;
                const batch = db.batch();

                snapshot.forEach(doc => {
                    if (doc.data().done === true) completed++;
                    // Reset tasks for the new day
                    batch.update(doc.ref, { done: false });
                });

                const percentage = Math.round((completed / total) * 100);

                // Save yesterday's performance to history
                await db.collection("progressHistory").add({
                    owner: currentUser,
                    date: lastReset, 
                    percent: percentage,
                    timestamp: firebase.firestore.FieldValue.serverTimestamp()
                });

                await batch.commit();
            }
            localStorage.setItem(`lastReset_${currentUser}`, today);
            location.reload(); // Refresh to show reset state
        } else if (!lastReset) {
            localStorage.setItem(`lastReset_${currentUser}`, today);
        }
    }

    // --- 3. LOAD THE 7-DAY HISTORY LIST ---
    async function loadHistory() {
        const historyList = document.getElementById('historyList');
        const snapshot = await db.collection("progressHistory")
            .where("owner", "==", currentUser)
            .orderBy("timestamp", "desc")
            .limit(7)
            .get();

        if (snapshot.empty) return;

        historyList.innerHTML = ""; // Clear the "No history" message
        snapshot.forEach(doc => {
            const data = doc.data();
            const itemHTML = `
                <div class="list-group-item bg-transparent border-0 px-0 mb-3">
                    <div class="d-flex justify-content-between align-items-center mb-1">
                        <span class="small fw-bold">${data.date}</span>
                        <span class="small fw-800" style="color: var(--primary)">${data.percent}%</span>
                    </div>
                    <div class="progress" style="height: 6px;">
                        <div class="progress-bar" style="width: ${data.percent}%"></div>
                    </div>
                </div>
            `;
            historyList.insertAdjacentHTML('beforeend', itemHTML);
        });
    }

    // --- 4. PROGRESS & CHART LOGIC (Existing) ---
    async function updateProgress() {
        const snapshot = await db.collection("dailyTasks").where("owner", "==", currentUser).get();
        const total = snapshot.size;
        let completed = 0;
        snapshot.forEach(doc => { if(doc.data().done === true) completed++; });

        const percentage = total > 0 ? Math.round((completed / total) * 100) : 0;
        document.getElementById('percentText').textContent = percentage;
        document.getElementById('completedCount').textContent = completed;
        document.getElementById('totalTasks').textContent = total;
        document.getElementById('remainingTasks').textContent = total - completed;
        document.getElementById('mainProgressBar').style.width = percentage + "%";
    }

    async function renderMonthlyChart() {
        const ctx = document.getElementById('progressChart').getContext('2d');
        const snapshot = await db.collection("monthlyTasks").where("owner", "==", currentUser).get();
        const labels = [];
        const dataValues = [];
        snapshot.forEach(doc => {
            labels.push(doc.data().name);
            const count = doc.data().days ? doc.data().days.filter(d => d === true).length : 0;
            dataValues.push(count);
        });

        if (window.myProgressChart) window.myProgressChart.destroy();
        window.myProgressChart = new Chart(ctx, {
            type: 'bar',
            data: {
                labels: labels,
                datasets: [{
                    data: dataValues,
                    backgroundColor: themeColor,
                    borderRadius: 6
                }]
            },
            options: {
                indexAxis: 'y',
                responsive: true,
                maintainAspectRatio: false,
                plugins: { legend: { display: false } },
                scales: {
                    x: { beginAtZero: true, max: 31, grid: { display: false } },
                    y: { grid: { display: false } }
                }
            }
        });
    }

    // Initialize all functions on load
    document.addEventListener('DOMContentLoaded', async () => {
        await checkDailyReset(); // 1. Check for midnight first
        updateProgress();       // 2. Show today's stats
        loadHistory();          // 3. Show the 7-day history
    });
</script>
