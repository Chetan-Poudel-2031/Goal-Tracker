<script>
    // 1. PREVENT FLASH: Apply theme and mode before page renders
    const savedColor = localStorage.getItem("themeColor") || "#6366f1";
    const savedMode = localStorage.getItem("displayMode") || "light";
    document.documentElement.setAttribute('data-theme', savedMode);
    
    if (savedColor) {
        document.documentElement.style.setProperty('--primary', savedColor);
        const s = document.createElement('style');
        s.innerHTML = `
            :root { --primary: ${savedColor} !important; } 
            
            /* Navbar Styles (Matching Daily/Checklist) */
            .navbar-nav .nav-link:not(.settings-link) { 
                color: var(--text) !important; 
                opacity: 0.7; 
                transition: 0.3s; 
            }
            .navbar-nav .nav-link:not(.settings-link):hover { 
                opacity: 1 !important; 
            }
            
            /* Settings Link - Always Themed */
            a.nav-link.settings-link, 
            a.nav-link.settings-link i { 
                color: ${savedColor} !important; 
                opacity: 0.9 !important; 
            }
            a.nav-link.settings-link:hover { opacity: 1 !important; transform: scale(1.05); }

            /* Buttons and Elements */
            .btn-outline-primary { border-color: ${savedColor} !important; color: ${savedColor} !important; }
            .btn-outline-primary:hover { background-color: ${savedColor} !important; color: white !important; }
            .progress-bar { background-color: ${savedColor} !important; }
            .stat-circle { color: ${savedColor} !important; }
            .text-gradient { 
                background: linear-gradient(45deg, ${savedColor}, #6610f2) !important; 
                -webkit-background-clip: text !important; 
                -webkit-text-fill-color: transparent !important; 
            }

            /* Short Underline Aligned to the Left */
/* Underline that matches text width */
.nav-link {
    display: inline-block !important; /* Forces the link to be only as wide as the text */
    position: relative;
    padding-bottom: 5px !important;
}

.nav-link.active::after {
    content: "";
    position: absolute;
    bottom: 0;
    left: 0;
    width: 100%; /* Now matches the text width exactly */
    height: 3px;
    background-color: ${savedColor} !important;
    border-radius: 10px;
}

    /* Fixed Active Highlight */
    .navbar-nav .nav-link.active { 
        color: var(--text) !important; 
        opacity: 1 !important; 
        border-bottom: 3px solid ${savedColor} !important; 
        padding-bottom: 5px !important;
    }

    
        `;
        document.head.appendChild(s);
    }
</script>

<style>
    :root {
        --bg: #f8fafc;
        --card-bg: #ffffff;
        --text: #1e293b;
        --border: #e2e8f0;
        --muted: #64748b;
        --progress-empty: rgba(0, 0, 0, 0.1); /* Light mode empty bar */
    }

    [data-theme="dark"] {
        --bg: #0f172a;
        --card-bg: #1e293b;
        --text: #f1f5f9;
        --border: #334155;
        --muted: #94a3b8;
        --progress-empty: rgba(255, 255, 255, 0.1); /* Dark mode empty bar */
    }

    body {
        background-color: var(--bg);
        color: var(--text);
        font-family: 'Plus Jakarta Sans', sans-serif;
        transition: 0.3s;
    }

    .navbar { border-bottom: 1px solid var(--border); background: var(--card-bg) !important; }
    
    .progress-card {
        background: var(--card-bg);
        border-radius: 24px;
        padding: 35px;
        border: 1px solid var(--border);
        box-shadow: 0 10px 30px rgba(0,0,0,0.4);
        margin-top: 30px;
        margin-bottom: 30px;
    }

    /* Progress Bar Improvements */
    .progress { 
        background-color: var(--progress-empty) !important; 
        height: 20px; 
        border-radius: 50px; 
        overflow: hidden;
    }

    .stat-circle { font-size: 3rem; font-weight: 800; }
    .history-title { font-weight: 800; color: var(--text); }
    .history-icon { color: var(--text); opacity: 0.8; }
    .text-muted { color: var(--muted) !important; }
    
    .chart-wrapper { position: relative; height: 40vh; width: 100%; margin: 20px 0; }


    /* Navbar Toggler Icon Theme Sync */
.navbar-toggler {
    border-color: var(--border) !important;
}

/* In Light Mode (Default) */
.navbar-toggler-icon {
    filter: none;
}

/* In Dark Mode - Inverts the black icon to white */
[data-theme="dark"] .navbar-toggler-icon {
    filter: invert(1) grayscale(100%) brightness(200%);
}

/* Ensure the button itself doesn't have a weird background */
.navbar-toggler:focus {
    box-shadow: 0 0 0 0.25rem rgba(var(--primary-rgb), 0.25);
    outline: none;
}

.navbar-nav .nav-item {
    margin-right: 15px; /* Adds space between the links */
}

/* Ensure the active link doesn't have the old border anymore */
.nav-link.active {
    border-bottom: none !important;
}
</style>

<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-10 col-lg-8">
            <div class="progress-card text-center">
                <h2 class="fw-bold mb-4">Daily Goal Progress</h2>
                <div class="stat-circle mb-2"><span id="percentText">0</span>%</div>
                <p class="text-muted mb-4">You have completed <span id="completedCount">0</span> tasks today.</p>
                
                <div class="progress mb-4" style="height: 20px; border-radius: 50px;">
                    <div id="mainProgressBar" class="progress-bar progress-bar-striped progress-bar-animated" role="progressbar" style="width: 0%"></div>
                </div>

                <div class="row text-center mb-4">
                    <div class="col-6 border-end">
                        <small class="text-muted text-uppercase fw-bold" style="font-size: 0.7rem;">Total Tasks</small>
                        <h5 class="mb-0 fw-bold" id="totalTasks">0</h5>
                        
                    </div>
                    <div class="col-6">
                        <small class="text-muted text-uppercase fw-bold" style="font-size: 0.7rem;">Remaining</small>
                        <h5 class="mb-0 fw-bold" id="remainingTasks">0</h5>
                        
                    </div>
                </div>

                <div class="d-grid gap-2">
                    <button onclick="window.location.href='todo.html'" class="btn btn-outline-primary shadow-sm py-2">

            </div>

                <h4 class="history-title mb-4">
                    <i class="bi bi-calendar-event-fill history-icon me-2"></i>Past 7 Days
                </h4>
                <div id="historyList" class="list-group list-group-flush">
                    <div class="text-center py-3 text-muted small">No history available!</div>
                </div>
            </div>

            <div class="progress-card">
                <div class="text-center mb-4">
                    <h2 class="fw-bold mb-1">Monthly Habits</h2>
                    <p class="text-muted small">Total days checked per habit</p>
                </div>
                <div class="chart-wrapper">
                    <canvas id="progressChart"></canvas>
                </div>
                <div class="d-grid gap-2">
                    <button onclick="window.location.href='checklist.html'" class="btn btn-outline-primary shadow-sm py-2">Manage Monthly Checklist</button>
                </div>
            </div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
    const currentUser = localStorage.getItem("username") || "guest";
    let themeColor = "#4a90e2"; // Default

    /* --- 1. THEME SYNC --- */
    db.collection("userSettings").doc(currentUser).get().then(doc => {
        if (doc.exists && doc.data().themeColor) {
            themeColor = doc.data().themeColor;
            document.documentElement.style.setProperty('--primary', themeColor);
            
            // Re-render chart once theme is known
            renderMonthlyChart();
        } else {
            renderMonthlyChart();
        }
    });

    /* --- 2. PROGRESS LOGIC --- */
    async function updateProgress() {
        const snapshot = await db.collection("dailyTasks").where("owner", "==", currentUser).get();
        const total = snapshot.size;
        let completed = 0;
        snapshot.forEach(doc => { if(doc.data().done) completed++; });
        const percentage = total > 0 ? Math.round((completed / total) * 100) : 0;
        document.getElementById('percentText').textContent = percentage;
        document.getElementById('mainProgressBar').style.width = percentage + "%";
    }

    /* --- 3. BAR CHART LOGIC --- */
    async function renderMonthlyChart() {
        const ctx = document.getElementById('progressChart').getContext('2d');
        const snapshot = await db.collection("monthlyTasks").where("owner", "==", currentUser).get();
        
        const labels = [];
        const dataValues = [];
        snapshot.forEach(doc => {
            labels.push(doc.data().name);
            const count = doc.data().days ? doc.data().days.filter(d => d === true).length : 0;
            dataValues.push(count);
        });

        if (window.myProgressChart) window.myProgressChart.destroy();

        window.myProgressChart = new Chart(ctx, {
            type: 'bar',
            data: {
                labels: labels,
                datasets: [{
                    data: dataValues,
                    backgroundColor: themeColor, // Bar color now matches the theme
                    borderRadius: 6,
                    borderWidth: 0
                }]
            },
            options: {
                indexAxis: 'y',
                responsive: true,
                maintainAspectRatio: false,
                plugins: { legend: { display: false } },
                scales: {
                    x: { beginAtZero: true, max: 30, grid: { display: false } },
                    y: { grid: { display: false } }
                }
            }
        });
    }

    document.addEventListener('DOMContentLoaded', () => {
        updateProgress();
        // displayHistory() would go here (omitted for brevity as requested)
    });
    // Updated updateProgress function to fill those numbers back up
    async function updateProgress() {
        try {
            const snapshot = await db.collection("dailyTasks").where("owner", "==", currentUser).get();
            const total = snapshot.size;
            let completed = 0;
            
            snapshot.forEach(doc => {
                if(doc.data().done === true) completed++;
            });

            const percentage = total > 0 ? Math.round((completed / total) * 100) : 0;

            // Updating the numbers in the HTML
            document.getElementById('percentText').textContent = percentage;
            document.getElementById('completedCount').textContent = completed;
            document.getElementById('totalTasks').textContent = total;
            document.getElementById('remainingTasks').textContent = total - completed;

            const progressBar = document.getElementById('mainProgressBar');
            if (progressBar) progressBar.style.width = percentage + "%";
        } catch (error) {
            console.error("Error fetching daily tasks:", error);
        }
    }
</script>
