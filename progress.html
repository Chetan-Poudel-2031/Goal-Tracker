        :root { --primary: #4a90e2; --bg: #f4f7f6; }

            background: white;

<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-10 col-lg-8">
            <div class="progress-card text-center">
                <h2 class="fw-bold mb-4">Daily Goal Progress</h2>
                <div class="stat-circle mb-2"><span id="percentText">0</span>%</div>
                <p class="text-muted mb-4">You have completed <span id="completedCount">0</span> tasks today.</p>
                <div class="progress main-bar mb-4">
                    <div id="mainProgressBar" class="progress-bar progress-bar-striped progress-bar-animated" role="progressbar" style="width: 0%"></div>
                </div>
                <div class="row text-center">
                    <div class="col-6 border-end">
                        <h5 class="mb-0" id="totalTasks">0</h5>
                        <small class="text-muted">Total Tasks</small>
                    </div>
                    <div class="col-6">
                        <h5 class="mb-0" id="remainingTasks">0</h5>
                        <small class="text-muted">Remaining</small>
                    </div>
                    <hr class="my-4">
                <div class="d-grid gap-2">
                    <button onclick="window.location.href='todo.html'" class="btn btn-outline-primary btn-lg shadow-sm py-2">
                        <i class="bi bi-calendar-check me-2"></i>Manage Daily Tasks
                    </button>
                </div>
                </div>
            </div>

            <div class="progress-card">
                <h4 class="history-title mb-3"><i class="bi bi-calendar3 me-2 text-primary"></i>Past 7 Days</h4>
                <div id="historyList" class="list-group list-group-flush">
                    <div class="text-center py-3 text-muted small">No history recorded yet.</div>
                </div>
            </div>

            <div class="progress-card">
                <div class="text-center mb-4">
                    <h2 class="fw-bold mb-1">Habit Completion Frequency</h2>
                    <p class="text-muted small">Comparison of total days checked for each monthly habit</p>
                </div>
                <div class="chart-wrapper">
                    <canvas id="progressChart"></canvas>
                </div>
                <hr class="my-4">
                <div class="d-grid gap-2">
                    <button onclick="window.location.href='checklist.html'" class="btn btn-outline-primary btn-lg shadow-sm py-2">
                        <i class="bi bi-calendar-check me-2"></i>Manage Monthly Checklist
                    </button>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    const currentUser = localStorage.getItem("username") || "guest";

    // --- 1. Daily Progress Logic (Firebase filtered by owner) ---
    function updateProgress() {
        db.collection("dailyTasks").where("owner", "==", currentUser).get().then((snapshot) => {
            const total = snapshot.size;
            let completed = 0;
            snapshot.forEach(doc => {
                if(doc.data().done) completed++;
            });

            const percentage = total > 0 ? Math.round((completed / total) * 100) : 0;

            document.getElementById('percentText').textContent = percentage;
            document.getElementById('completedCount').textContent = completed;
            document.getElementById('totalTasks').textContent = total;
            document.getElementById('remainingTasks').textContent = total - completed;

            const progressBar = document.getElementById('mainProgressBar');
            if (progressBar) progressBar.style.width = percentage + "%";
        });
    }

    // --- 2. History Logic (Pulling from a dedicated collection or local - following your previous pattern) ---
    function displayHistory() {
        const history = JSON.parse(localStorage.getItem(`progressHistory_${currentUser}`)) || [];
        const historyContainer = document.getElementById('historyList');
        if (history.length === 0) return;

        const lastSeven = history.slice(-7).reverse(); 
        historyContainer.innerHTML = lastSeven.map(entry => {
            const dateObj = new Date(entry.date);
            const dayName = dateObj.toLocaleDateString('en-US', { weekday: 'short' });
            return `
                <div class="list-group-item bg-transparent px-0 border-0 mb-3">
                    <div class="d-flex justify-content-between mb-1">
                        <span class="small fw-bold text-secondary">
                            <span class="text-primary">${dayName}</span>, ${entry.date}
                        </span>
                        <span class="small fw-bold">${entry.percent}%</span>
                    </div>
                    <div class="progress history-bar-container">
                        <div class="progress-bar" style="width: ${entry.percent}%; background: #4a90e2;"></div>
                    </div>
                </div>`;
        }).join('');
    }

    // --- 3. Bar Diagram Logic (Firebase filtered by owner) ---
    function renderMonthlyChart() {
        const ctx = document.getElementById('progressChart').getContext('2d');

        db.collection("monthlyTasks").where("owner", "==", currentUser).get().then((snapshot) => {
            const labels = [];
            const dataValues = [];

            snapshot.forEach(doc => {
                const task = doc.data();
                labels.push(task.name);
                const doneCount = task.days ? task.days.filter(d => d === true).length : 0;
                dataValues.push(doneCount);
            });

            if (window.myProgressChart) { window.myProgressChart.destroy(); }

            window.myProgressChart = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: labels,
                    datasets: [{
                        label: 'Total Days Completed',
                        data: dataValues,
                        backgroundColor: 'rgba(74, 144, 226, 0.6)',
                        borderColor: '#4a90e2',
                        borderWidth: 2,
                        borderRadius: 8
                    }]
                },
                options: {
                    indexAxis: 'y',
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { display: false } },
                    scales: {
                        x: { beginAtZero: true, max: 30, grid: { display: false } },
                        y: { grid: { display: false } }
                    }
                }
            });
        });
    }

    document.addEventListener('DOMContentLoaded', () => {
        updateProgress();
        displayHistory();
        renderMonthlyChart();
    });
</script>
